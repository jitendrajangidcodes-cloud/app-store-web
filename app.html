<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App — Jitendra's apps</title>
<script>
(function () {
  var stored = localStorage.getItem("theme");
  var theme = stored || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="wordmark" href="index.html">
      <span class="mark">J</span>
      <span class="name">Jitendra <span>— apps</span></span>
    </a>
    <div class="topbar-actions">
      <button class="theme-toggle" type="button" aria-label="Toggle color theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z"/></svg>
      </button>
    </div>
  </div>

  <div id="detail-root">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<script src="script.js"></script>
<script>
(async function () {
  const root = document.getElementById("detail-root");
  const id = new URLSearchParams(location.search).get("id");
  const apps = await loadApps();
  const app = apps.find((a) => a.id === id);

  if (!app) {
    root.innerHTML = `
      <a class="back-link" href="index.html">&larr; Back to all apps</a>
      <div class="empty-state">App not found.</div>
    `;
    return;
  }

  document.title = `${app.name} — Jitendra's apps`;

  root.innerHTML = `
    <a class="back-link" href="index.html">&larr; Back to all apps</a>
    <div class="detail-head">
      <img class="detail-icon" src="${app.icon}" alt="${app.name} icon">
      <div>
        <h1>${app.name}</h1>
        <p class="tagline">${app.tagline}</p>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-cell"><span class="label">Version</span><span class="value" data-stat="version">…</span></div>
      <div class="stat-cell"><span class="label">Size</span><span class="value" data-stat="size">…</span></div>
      <div class="stat-cell"><span class="label">Platform</span><span class="value">${app.platform}</span></div>
      <div class="stat-cell"><span class="label">Category</span><span class="value">${app.category}</span></div>
    </div>

    <div class="download-block">
      <button class="download-btn" aria-disabled="true" data-download-btn>Checking latest release…</button>
      <span class="download-meta" data-stat="published"></span>
    </div>

    <div class="detail-grid">
      <div>
        <h2>About</h2>
        <p class="about-text">${app.about}</p>
        <div class="requirements">
          <span class="label">Requirements</span>
          <p>${app.requirements}</p>
        </div>
      </div>
      <div class="whats-new-card">
        <h2>What's new</h2>
        <p class="notes" data-stat="notes">Loading release notes…</p>
      </div>
    </div>
  `;

  const release = await fetchLatestRelease(app.repo);
  const versionEl = root.querySelector('[data-stat="version"]');
  const sizeEl = root.querySelector('[data-stat="size"]');
  const publishedEl = root.querySelector('[data-stat="published"]');
  const notesEl = root.querySelector('[data-stat="notes"]');
  const downloadBtn = root.querySelector("[data-download-btn]");

  if (release && release.downloadUrl) {
    versionEl.textContent = `v${release.version}`;
    sizeEl.textContent = formatSize(release.sizeBytes);
    publishedEl.textContent = `Released ${formatDate(release.publishedAt)}`;
    notesEl.textContent = release.notes || "No release notes for this version.";

    const a = document.createElement("a");
    a.className = "download-btn";
    a.href = release.downloadUrl;
    a.textContent = `Download APK · v${release.version}`;
    downloadBtn.replaceWith(a);
  } else {
    versionEl.textContent = "unavailable";
    sizeEl.textContent = "--";
    publishedEl.textContent = "";
    notesEl.textContent = "Could not reach GitHub Releases right now — try again shortly.";
    downloadBtn.textContent = "Download unavailable";
  }
})();
</script>
</body>
</html>
