<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App — PNSJY</title>
<link rel="icon" type="image/png" href="assets/brand/pnsjy-mark.png">
<script>
(function () {
  var stored = localStorage.getItem("theme");
  var theme = stored || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="glow-bg"><span class="g1"></span><span class="g2"></span><span class="g3"></span></div>

<div class="topbar-wrap">
  <div class="topbar">
    <a class="wordmark" href="index.html">
      <span id="nav-mark"></span>
      <span class="byline">by Jitendra</span>
    </a>
    <div class="spacer"></div>
    <span class="live-chip"><span class="dot"></span>live from GitHub Releases</span>
    <div class="topbar-actions">
      <button class="theme-toggle" type="button" aria-label="Toggle color theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="detail-root">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<script src="script.js?v=2"></script>
<script>
(async function () {
  document.getElementById("nav-mark").innerHTML = pnsjyLogoHTML(30);

  const root = document.getElementById("detail-root");
  const id = new URLSearchParams(location.search).get("id");
  const apps = await loadApps();
  const app = apps.find((a) => a.id === id);

  if (!app) {
    root.innerHTML = `
      <a class="back-link" href="index.html">&larr; All apps</a>
      <div class="empty-state">App not found.</div>
    `;
    return;
  }

  document.title = `${app.name} — PNSJY`;

  root.innerHTML = `
    <a class="back-link" href="index.html">&larr; All apps</a>

    <section class="detail-head">
      ${appIconHTML(app, 96)}
      <div class="titles">
        <h1>${app.name}</h1>
        <p class="tagline">${app.tagline}</p>
        <div class="detail-chips">
          <span class="chip-static accent" data-stat="version">…</span>
          <span class="chip-static plain" data-stat="size">…</span>
          <span class="chip-static plain">${app.platform}</span>
          <span class="chip-static plain">${app.category}</span>
          <span class="chip-static ${app.requiresAccount ? "plain" : "accent"}">${app.requiresAccount ? "Requires Google sign-in" : "No account needed"}</span>
        </div>
      </div>
      <button class="download-btn" aria-disabled="true" data-download-btn>Checking latest release…</button>
    </section>

    ${
      app.screenshots && app.screenshots.length
        ? `<section class="screenshot-section">
            <h2>Screenshots</h2>
            <div class="screenshot-row">${app.screenshots
              .map((s) => `<img src="${s.src}" alt="${s.alt}" loading="lazy">`)
              .join("")}</div>
          </section>`
        : ""
    }

    <section class="about-card">
      <h2>About</h2>
      <p>${app.about}</p>
      <p class="requirements">${app.requirements}</p>
    </section>

    <section class="two-col">
      <div class="notes-card">
        <h2>Release notes</h2>
        <div id="release-history">
          <div class="release-entry"><p>Loading release notes…</p></div>
        </div>
      </div>

      <div class="install-card">
        <h2>Install in 3 steps</h2>
        <div class="install-steps">
          <div class="install-step"><span class="num">1</span><span class="txt">Tap <strong>Download APK</strong> above</span></div>
          <div class="install-step"><span class="num">2</span><span class="txt">Allow <strong>install from unknown sources</strong> if prompted</span></div>
          <div class="install-step"><span class="num">3</span><span class="txt">Open the file and tap <strong>Install</strong></span></div>
        </div>
      </div>
    </section>

    <section class="about-card feedback-card">
      <h2>Feedback on ${app.name}</h2>
      <p>Have an idea, hit a bug, or just want to say something? It opens a GitHub issue — no account data shared.</p>
      <div class="feedback-row">${feedbackRowHTML(app)}</div>
    </section>

    <footer class="site-footer">
      <span>PNSJY — built and maintained by Jitendra.</span>
      <span class="mono">github.io/app-store</span>
    </footer>
  `;

  const versionEl = root.querySelector('[data-stat="version"]');
  const sizeEl = root.querySelector('[data-stat="size"]');
  const downloadBtn = root.querySelector("[data-download-btn]");
  const historyEl = root.querySelector("#release-history");

  // Latest/download prefer the generated manifest (no rate limit); the multi-
  // version notes list stays live but degrades to the manifest's single entry.
  const manifestLatest = await getRelease(app);
  const history = await fetchReleaseHistory(app.repo, 3);
  const latest = history[0] || manifestLatest;

  if (latest && latest.downloadUrl) {
    versionEl.textContent = `v${latest.version}`;
    sizeEl.textContent = formatSize(latest.sizeBytes);

    const a = document.createElement("a");
    a.className = "download-btn";
    a.href = latest.downloadUrl;
    a.textContent = `⬇ Download APK · v${latest.version}`;
    downloadBtn.replaceWith(a);

    const historyList = history.length ? history : [manifestLatest];
    historyEl.innerHTML = historyList
      .map(
        (rel, i) => `
        <div class="release-entry ${i === 0 ? "" : "old"}">
          <div class="row">
            <span class="chip-static accent">v${rel.version}</span>
            <span class="chip-static plain" style="border:none;padding:0;">${i === 0 ? "latest" : formatDate(rel.publishedAt)}</span>
          </div>
          <p>${rel.notes || "No release notes for this version."}</p>
        </div>`
      )
      .join("");
  } else {
    versionEl.textContent = "unavailable";
    sizeEl.textContent = "--";
    downloadBtn.textContent = "Download unavailable";
    historyEl.innerHTML = `<div class="release-entry"><p>Could not reach GitHub Releases right now — try again shortly.</p></div>`;
  }
})();
</script>
</body>
</html>
