name: Build release manifest

on:
  push:
    branches: [main]
    paths: [apps.json, scripts/build-manifest.mjs, .github/workflows/manifest.yml]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manifest
  cancel-in-progress: true

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/build-manifest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit refreshed manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet releases.json; then
            git add releases.json
            git commit -m "chore: refresh releases.json"
            git push
          else
            echo "manifest unchanged"
          fi
